name: '{{project_name}}_analytics'
version: '1.0.0'
config-version: 2

profile: 'default'

# dbt 1.11 flags — catch errors early
flags:
  require_unique_project_resource_names: true

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
asset-paths: ["assets"]

clean-targets:
  - "target"
  - "dbt_packages"
  - "logs"

# ---------------------------------------------------------------------------
# GLOBAL VARIABLES — Never hardcode these in SQL files
# ---------------------------------------------------------------------------
vars:
  # Date thresholds
  default_start_date: '2020-01-01'
  lookback_days: 3              # For incremental model late-arriving data
  dev_data_days: 30             # Days of data to load in dev environment

  # Schema mappings (override per-source if needed)
  raw_schema: 'raw'
  staging_schema: 'staging'
  core_schema: 'core'
  analytics_schema: 'analytics'
  report_schema: 'report'
  snapshot_schema: '{{project_name}}_snapshots'

# ---------------------------------------------------------------------------
# QUERY TAG — Injected into all warehouse queries for cost tracking
# ---------------------------------------------------------------------------
query-comment:
  comment: "dbt: {{ node.unique_id }}"
  append: true

# ---------------------------------------------------------------------------
# MODEL CONFIGURATIONS BY DIRECTORY
# ---------------------------------------------------------------------------
models:
  {{project_name}}_analytics:

    # --- RAW LAYER ---
    raw:
      +materialized: view
      +schema: raw
      +tags: ['raw']

    # --- STAGING LAYER ---
    staging:
      +materialized: view
      +schema: staging
      +tags: ['daily', 'staging']

    # --- CORE LAYER (Star Schema) ---
    core:
      +materialized: table
      +schema: core
      +tags: ['daily', 'core']
      intermediate:
        +materialized: view
        +schema: core
        +tags: ['daily', 'core', 'intermediate']

    # --- ANALYTICS LAYER (Team OBTs) ---
    analytics:
      +materialized: table
      +schema: analytics
      +tags: ['daily', 'analytics']

    # --- REPORT LAYER (Aggregations) ---
    report:
      +materialized: table
      +schema: report
      +tags: ['daily', 'report']

# ---------------------------------------------------------------------------
# SNAPSHOT CONFIGURATIONS
# ---------------------------------------------------------------------------
snapshots:
  {{project_name}}_analytics:
    +target_schema: "{{ project.name }}_snapshots"
    +tags: ['snapshot']

# ---------------------------------------------------------------------------
# SEED CONFIGURATIONS
# ---------------------------------------------------------------------------
seeds:
  {{project_name}}_analytics:
    +schema: seeds

# ---------------------------------------------------------------------------
# ON-RUN HOOKS (Audit logging, permissions, etc.)
# ---------------------------------------------------------------------------
# on-run-start:
#   - "{{ log('dbt run started at ' ~ run_started_at, info=True) }}"

# on-run-end:
#   - "{{ log('dbt run completed', info=True) }}"
