# =============================================================================
# _source.yml — Source definitions for raw_{{source}}
# =============================================================================
# RULES:
#   - Source names MUST exactly match Dagster asset names (lineage glue)
#   - Always define freshness thresholds (warn + error)
#   - loaded_at_field MUST be cast to UTC
#   - One _source.yml per source system subdirectory
# =============================================================================

version: 2

sources:
  - name: "raw_{{source}}"
    description: >
      Raw data from {{source}} pipeline. Loaded by the {{source}} ingestion pipeline.
    database: "{{ env_var('TARGET_DATABASE') }}"
    schema: "raw_{{source}}"

    # Freshness checks — dbt 1.11+ requires freshness inside config block
    # Run `dbt source freshness` before every pipeline run
    config:
      freshness:
        warn_after:
          count: 12
          period: hour
        error_after:
          count: 24
          period: hour
      loaded_at_field: inserted_at

    tables:
      - name: "{{table_1}}"
        description: >
          {{table_1}} records from {{source}}. One row per {{entity_1}}.
        columns:
          - name: "{{entity_1}}_id"
            description: "Primary identifier for {{entity_1}}"
            tests:
              - unique
              - not_null

      - name: "{{table_2}}"
        description: >
          {{table_2}} records from {{source}}. One row per {{entity_2}}.
        columns:
          - name: "{{entity_2}}_id"
            description: "Primary identifier for {{entity_2}}"
            tests:
              - unique
              - not_null

      # Add more tables as needed
