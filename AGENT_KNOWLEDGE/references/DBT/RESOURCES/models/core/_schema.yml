version: 2

models:
  - name: dim_date
    description: >
      Calendar dimension table. The ONLY place dates live in the warehouse.
      All date-based analysis joins through this table.
      Supports: business week, monthly, fiscal year, quarter analysis.
    config:
      tags: ['daily', 'core']
    columns:
      - name: date_sk
        description: "MD5 surrogate key for the date"
        tests:
          - unique
          - not_null
      - name: date_day
        description: "Calendar date (YYYY-MM-DD)"
        tests:
          - unique
          - not_null
      - name: year_number
        description: "4-digit year"
        tests:
          - not_null
      - name: quarter_number
        description: "Quarter of the year (1-4)"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1, 2, 3, 4]
      - name: month_number
        description: "Month of the year (1-12)"
        tests:
          - not_null
      - name: day_of_week_number
        description: "Day of the week (0=Sunday, 6=Saturday)"
        tests:
          - not_null
      - name: is_weekend
        description: "True if Saturday or Sunday"
        tests:
          - not_null
      - name: is_weekday
        description: "True if Monday through Friday"
        tests:
          - not_null
