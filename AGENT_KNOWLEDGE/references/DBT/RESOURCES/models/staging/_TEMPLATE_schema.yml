# =============================================================================
# _schema.yml — Testing and governance hub for this directory
# =============================================================================
# RULES:
#   - One _schema.yml per subdirectory
#   - Every model MUST have a description
#   - Every column MUST have a description
#   - Tests: unique, not_null on PKs; relationships for FKs; accepted_values for enums
#   - Use dbt_expectations for complex business logic validation
#   - Tags and meta MUST match Dagster configuration
#   - Report-layer models MUST have contract: true
# =============================================================================

version: 2

models:
  # ---------------------------------------------------------------------------
  # Example: Staging Model
  # ---------------------------------------------------------------------------
  - name: stg_{{source}}__{{table}}
    description: >
      Cleaned and typed staging view of raw_{{source}}.{{table}}.
      One row per {{entity}}. No joins, no aggregations.
      Surrogate keys generated here via MD5 hash.
    meta:
      owner: "data-engineering"
      contains_pii: false
    config:
      tags: ['daily', 'staging']

    columns:
      - name: "{{entity}}_sk"
        description: "MD5 surrogate key for {{entity}}s"
        tests:
          - unique
          - not_null

      - name: "{{entity}}_id"
        description: "Natural key — original ID from raw_{{source}}"
        tests:
          - unique
          - not_null

      # - name: "user_name"
