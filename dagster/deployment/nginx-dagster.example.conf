# Example nginx config for dagster.bioptimizers.net
# Copy to /etc/nginx/sites-available/dagster.bioptimizers.net
# Enable: ln -sf /etc/nginx/sites-available/dagster.bioptimizers.net /etc/nginx/sites-enabled/
# Get SSL cert: certbot certonly --nginx -d dagster.bioptimizers.net
# Then: nginx -t && systemctl reload nginx
#
# Cloudflare: Ensure DNS for dagster.bioptimizers.net is proxied (orange cloud) if using Cloudflare SSL.
# Origin certs: Use "Full" or "Full (strict)" in Cloudflare SSL settings.

server {
    listen 80;
    server_name dagster.bioptimizers.net;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name dagster.bioptimizers.net;

    ssl_certificate     /etc/letsencrypt/live/dagster.bioptimizers.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dagster.bioptimizers.net/privkey.pem;

    auth_basic "Dagster";
    auth_basic_user_file /etc/nginx/.htpasswd-dagster;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering off;
    }
}
