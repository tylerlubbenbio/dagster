# Dagster instance config — local development
# https://docs.dagster.io/concepts/dagster-instance
# Uses default SQLite storage for local dev (no external Postgres needed)

scheduler:
  module: dagster.core.scheduler
  class: DagsterDaemonScheduler

run_coordinator:
  module: dagster.core.run_coordinator
  class: QueuedRunCoordinator
  config:
    max_concurrent_runs: 5

# Per-job concurrency: only 1 run of the same job at a time
concurrency:
  runs:
    tag_concurrency_limits:
      - key: "dagster/job_name"
        value:
          applyLimitPerUniqueValue: true
        limit: 1
