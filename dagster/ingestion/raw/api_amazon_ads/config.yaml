source: amazon_ads
source_type: api
connection_resource: amazon_ads
custom_extractor: true
default_group: raw_amazon_ads

assets:
  - name: amazon_ads_campaigns
    target_schema: raw_amazon_ads
    target_table: campaigns
    primary_key: campaignId
    incremental_strategy: full_refresh
    load_method: stage_copy

  - name: amazon_ads_ad_groups
    target_schema: raw_amazon_ads
    target_table: ad_groups
    primary_key: adGroupId
    incremental_strategy: full_refresh
    load_method: stage_copy
