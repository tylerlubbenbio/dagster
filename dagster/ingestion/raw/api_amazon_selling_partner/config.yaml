source: amazon_selling_partner
source_type: api
connection_resource: amazon_selling_partner
custom_extractor: true
default_group: raw_amazon_selling_partner

assets:
  - name: amazon_sp_orders
    target_schema: raw_amazon_selling_partner
    target_table: orders
    primary_key: AmazonOrderId
    incremental_strategy: timestamp
    incremental_column: LastUpdateDate
    load_method: stage_copy

  - name: amazon_sp_inventory
    target_schema: raw_amazon_selling_partner
    target_table: inventory
    primary_key: asin
    incremental_strategy: full_refresh
    load_method: stage_copy

  - name: amazon_sp_financial_events
    target_schema: raw_amazon_selling_partner
    target_table: financial_events
    primary_key: event_id
    incremental_strategy: timestamp
    incremental_column: PostedDate
    load_method: stage_copy
