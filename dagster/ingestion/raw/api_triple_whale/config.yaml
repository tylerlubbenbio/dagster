source: triple_whale
source_type: api
connection_resource: triple_whale
custom_extractor: true
default_group: raw_triple_whale

assets:
  - name: triple_whale_attribution
    target_schema: raw_triple_whale
    target_table: attribution
    primary_key: id
    incremental_strategy: timestamp
    incremental_column: date
    load_method: stage_copy

  - name: triple_whale_summary
    target_schema: raw_triple_whale
    target_table: summary
    primary_key: date
    incremental_strategy: timestamp
    incremental_column: date
    load_method: stage_copy
