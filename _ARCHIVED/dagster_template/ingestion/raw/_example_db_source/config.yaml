# EXAMPLE: Internal Database Source Template
# Copy this directory, rename to internal_{your_source}, and customize.
# Remove the leading underscore from the directory name when ready.

source: example_db
source_type: internal_db
connection_resource: example_db  # Must match key in get_all_resources()
custom_extractor: true            # DB sources always use custom extractor
default_group: raw_example_db
default_tags:
  layer: raw
  source_type: internal_db
  source_system: example_db
  schedule_tier: daily

assets:
  - name: example_table
    description: >
      Example table from the Example database.
      Replace with actual table description.
    target_schema: raw_example_db
    target_table: example_table
    primary_key: id
    incremental_strategy: timestamp
    incremental_column: updated_at
    compute_kind: postgres
    load_method: s3_copy
    s3_bucket_config: s3_staging
    schedule_tier: daily
